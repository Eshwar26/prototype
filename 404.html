<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Cinefied</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0a0f;--surface:#13131a;--border:#2a2a3d;
      --accent:#ff3f3f;--text:#e8e8f0;--muted:#7070a0;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);color:var(--text);
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:24px;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(255,63,63,.08) 0%,transparent 60%),
                 radial-gradient(ellipse 40% 50% at 80% 90%,rgba(63,100,255,.07) 0%,transparent 60%);
      pointer-events:none;z-index:0
    }
    .content{position:relative;z-index:1}
    .logo{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(56px,12vw,96px);letter-spacing:4px;
      line-height:1;color:var(--text);margin-bottom:40px;
    }
    .logo span{color:var(--accent)}
    .error-label{
      font-family:'DM Mono',monospace;
      font-size:11px;letter-spacing:4px;
      color:var(--accent);text-transform:uppercase;
      margin-bottom:10px;
    }
    .num{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(120px,30vw,200px);
      letter-spacing:8px;line-height:1;
      color:var(--accent);
    }
    .label{
      font-family:'DM Mono',monospace;
      font-size:13px;letter-spacing:3px;
      color:var(--muted);text-transform:uppercase;
      margin-top:12px;margin-bottom:36px;
    }
    .btn{
      display:inline-block;
      padding:14px 32px;
      background:var(--accent);color:#fff;
      border:none;border-radius:10px;
      font-family:'DM Mono',monospace;
      font-size:13px;letter-spacing:2px;
      text-transform:uppercase;
      text-decoration:none;font-weight:600;
      transition:box-shadow .2s,transform .15s;
      cursor:pointer;
    }
    .btn:hover{
      box-shadow:0 0 24px rgba(255,63,63,.4);
      transform:translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo">CINE<span>FIED</span></div>
    <div class="error-label">// error</div>
    <div class="num">404</div>
    <div class="label">// this page doesn't exist</div>
    <a href="/index.html" class="btn">← BACK TO HOME</a>
  </div>
</body>
</html>
